name: CI for Products Service

on:
  push:
    branches:
      - master
    paths:
      - 'products-service/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Application Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: products-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecommerce_go-products-service:${{ github.sha }}
          no-cache: true
          provenance: false

      - name: Check out Infrastructure Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eCommerce-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update Image Tag in Infrastructure Repo
        run: |
          cd infra-repo
          sed -i 's|image: ghcr.io/.*|image: ghcr.io/${{ github.repository_owner }}/ecommerce_go-products-service:${{ github.sha }}|g' k8s/base/products-service/deployment.yaml

      - name: Commit and Push to Infra Repo
        run: |
          cd infra-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/products-service/deployment.yaml
          git commit -m "chore(gitops): update products-service image to ${{ github.sha }} from eCommerce_go"
          git push origin master
